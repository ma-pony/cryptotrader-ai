services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cryptotrader
      POSTGRES_USER: ${POSTGRES_USER:-cryptotrader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cryptotrader}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cryptotrader}:${POSTGRES_PASSWORD}@postgres:5432/cryptotrader
      REDIS_URL: redis://redis:6379
      API_KEY: ${API_KEY:-}
      # Disable Swagger UI and ReDoc in production to prevent schema leakage (Req 7.6)
      DOCS_ENABLED: "false"
    env_file:
      - .env
    volumes:
      - ctdata:/home/appuser/.cryptotrader
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  dashboard:
    build: .
    command: python -m streamlit run src/dashboard/app.py --server.port 8501
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cryptotrader}:${POSTGRES_PASSWORD}@postgres:5432/cryptotrader
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    ports:
      - "8501:8501"
    volumes:
      - ctdata:/home/appuser/.cryptotrader
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  scheduler:
    build: .
    command: arena scheduler start
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cryptotrader}:${POSTGRES_PASSWORD}@postgres:5432/cryptotrader
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    volumes:
      - ctdata:/home/appuser/.cryptotrader
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

volumes:
  pgdata:
  redisdata:
  ctdata:
