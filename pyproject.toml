[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cryptotrader-ai"
version = "0.1.0"
description = "AI-powered crypto trading system using LangGraph multi-agent debate"
readme = "README.md"
license = "MIT"
requires-python = ">=3.12"
dependencies = [
    "langchain>=1.2",
    "langchain-core>=1.2",
    "langchain-openai>=1.1",
    "langgraph>=1.0",
    "litellm>=1.80",
    "ccxt>=4.5",
    "pandas>=2.2",
    "pandas-ta>=0.3",
    "httpx>=0.27",
    "pydantic>=2.10",
    "typer>=0.12",
    "rich>=13.0",
    "tomli>=2.0",
    "redis>=5.0",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.29",
    "fastapi>=0.115",
    "uvicorn>=0.30",
    "numpy>=1.26",
    "streamlit>=1.30",
    "feedparser>=6.0.12",
    "structlog>=24.1",
    "pydantic-settings>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pre-commit>=3.0",
    "ruff>=0.8",
]
ml = [
    "torch>=2.10.0",
    "transformers>=5.3.0",
]

[project.scripts]
arena = "cli.main:app"

[tool.hatch.build.targets.wheel]
packages = ["src/cryptotrader", "src/api", "src/cli"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["src"]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
]

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "C",     # flake8-comprehensions
    "B",     # flake8-bugbear
    "T20",   # flake8-print
    "ASYNC", # flake8-asyncio
    "UP",    # pyupgrade
]
ignore = []

[tool.ruff.lint.isort]
known-first-party = ["cryptotrader", "api", "cli"]

[tool.ruff.lint.per-file-ignores]
"examples/**/*.py" = ["T201"]
"scripts/**/*.py" = ["T201"]
