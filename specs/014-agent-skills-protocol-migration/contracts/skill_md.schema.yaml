# SKILL.md frontmatter schema (所有 SKILL.md 文件用)
# 遵循 Anthropic Skills 协议格式
# 数量动态：initial 5 个，运行时可由 propose-new CLI 或用户手动新增
$schema: "http://json-schema.org/draft-07/schema#"
title: SkillMdFrontmatter
type: object
required: [name, description, scope]
properties:
  name:
    type: string
    pattern: "^[a-z][a-z0-9-]*$"
    description: |
      Lowercase kebab-case identifier matching the skill directory name.
      Initial set: tech-analysis, chain-analysis, news-analysis,
      macro-analysis, trading-knowledge. Additional skills can be added
      at runtime; middleware discovers via filesystem scan, not hardcoded.
  description:
    type: string
    minLength: 30
    maxLength: 500
    description: |
      One-sentence summary of what this skill provides. Visible to agent
      runtime as part of the SKILL.md content.
  scope:
    oneOf:
      - { const: "shared" }
      - { type: string, pattern: "^agent:(tech|chain|news|macro)$" }
    description: |
      Scope determines which agent prompts inject this skill:
      - "shared": injected to all 4 agent prompts (e.g., trading-knowledge)
      - "agent:tech" | "agent:chain" | "agent:news" | "agent:macro":
        injected only to that specific agent's prompt
      Replaces the obsolete hardcoded SKILL_NAME_BY_AGENT mapping —
      middleware uses this field for runtime discovery.
  manually_edited:
    type: boolean
    default: false
    description: |
      User-set flag. When true, `arena skills curate` MUST skip overwriting
      this file (or only append to designated AUTO-DISTILLED-PATTERNS region).
  version:
    type: string
    pattern: "^\\d+\\.\\d+$"
    default: "1.0"
additionalProperties: true   # Anthropic Skills 协议允许扩展字段（如 argument-hint, metadata 等）
