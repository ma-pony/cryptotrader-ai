# CryptoTrader AI — Main Configuration
# All settings in this file. No environment variables needed.

[app]
mode = "standalone"    # standalone | api
engine = "paper"       # paper | live
exchange_id = "binance"  # default exchange for market data

[llm]
# Unified LLM API endpoint — all models go through the same gateway
api_key = ""
base_url = ""          # e.g. "http://localhost:3000/v1" or your proxy
default_temperature = 0.2
timeout = 120
prompt_caching = true  # Anthropic prompt cache — ~90% input token discount for static system prompts

[llm.retry]
max_attempts = 3
retry_base_delay_s = 1.0
retry_backoff_factor = 2.0
retry_jitter = true

[models]
analysis = "glm-5"
debate = "glm-5"
verdict = "glm-5"
tech_agent = "glm-5"
chain_agent = "glm-5"
news_agent = "glm-5"
macro_agent = "glm-5"
fallback = "glm-5"
# spec 021 D2/D3: 60→90s. chain_agent + news_agent 因多轮 tool-calling
# (4-6 round) 在 deepseek-v4-flash 上经常逼近 60s 上限，触发 27/cycle
# degraded path; debate_round_2 也撞 60s（4 agent 一起重新分析）。升到
# 90s 给所有 LLM 调用 +50% 余量，仍远低于 graph_timeout_s=600。
timeout_seconds = 90

[debate]
max_rounds = 3
convergence_threshold = 0.1
divergence_hold_threshold = 0.7
skip_debate = true
consensus_skip_threshold = 0.5
confusion_skip_threshold = 0.05
confusion_max_dispersion = 0.2

[data]
default_timeframe = "1h"
ohlcv_limit = 100

[risk]
# Per-position stop-loss. Tightened 0.05 → 0.04 (2026-05-07) so 5
# positions can stop simultaneously without breaching the daily-loss limit:
#   max_total_notional × max_stop = 1.50 × 0.04 = 0.06 ≤ 0.08 (daily limit)
# leaving a 2% buffer for slippage / partial-fill / fee tail.
max_stop_loss_pct = 0.04

[risk.position]
# Dual-cap risk model calibrated for 5-pair 2x-leverage setup (2026-05-07).
# Each pair capped at 30% of equity (notional) so up to 5 perps can coexist
# within the 150% notional budget. Margin headroom 80% to fit 5 × 15% margin
# (= 75%) with 5% buffer for stop-loss execution + funding payments.
#
# Sanity (5 perps each at full single-cap):
#   total notional 5 × 30% = 150% ≤ 150% ✓
#   total margin   5 × 15% =  75% ≤  80% ✓
#   single stop-loss 0.30 × 4% = 1.2% (well under 8% daily limit)
#   five-stop simultaneous 1.50 × 4% = 6.0% ≤ 8% ✓
max_single_pct = 0.30
max_total_exposure_pct = 1.50
max_margin_used_pct = 0.80
max_correlated_positions = 2

[risk.loss]
# Tight 3% / 10% defaults caused circuit-breaker re-arm storms: a single
# down day put the bot in a 24h lockout and any subsequent cycle whose
# computed drawdown stayed above 10% reset the 24h TTL on every tick.
# 8% / 30% leaves headroom for normal sandbox/live volatility while
# still catching catastrophic drawdowns. Adjust per risk appetite.
max_daily_loss_pct = 0.08
max_drawdown_pct = 0.30
max_cvar_95 = 0.05
cvar_min_returns = 20

[risk.cooldown]
same_pair_minutes = 60
post_loss_minutes = 120

[risk.volatility]
flash_crash_threshold = 0.05
funding_rate_threshold = 0.005
flash_crash_lookback = 10

[risk.exchange]
max_api_latency_ms = 2000
health_check_interval_s = 30

[risk.rate_limit]
max_trades_per_hour = 6
max_trades_per_day = 20

[backtest]
initial_capital = 10000
slippage_base = 0.0005
fee_bps = 10.0
sma_fast = 20
sma_slow = 50
lookback = 60
default_position_pct = 0.1

[backtest.position_sizing]
high_confidence_pct = 0.35    # ceiling for position_scale mapping
medium_confidence_pct = 0.12  # legacy fallback (confidence >= 0.6)
low_confidence_pct = 0.06     # floor for position_scale mapping

[experience]
enabled = true
every_n_cycles = 20
min_commits_required = 10
lookback_commits = 30
model = ""
token_budget_pct = 0.30
verify_win_rate_tolerance = 0.15
min_cases_per_pattern = 5

[experience.regime_thresholds]
high_funding = 0.0003
negative_funding = -0.0001
high_vol = 0.025
low_vol = 0.010
trending_up = 0.05
trending_down = -0.05
extreme_fear_fng = 25
extreme_greed_fng = 75

[scheduler]
enabled = false
# Default 5-pair set diversified across correlation groups (BTC / ETH / L1-alt /
# meme / DeFi). Spot symbols here suit the binance default exchange; switch to
# perp variants ("BTC/USDT:USDT" etc) in local.toml when running on OKX with
# leverage. Adding more pairs costs LLM tokens linearly per cycle but lets the
# dual-cap risk gate have more candidates to fit within the budget.
pairs = [
  "BTC/USDT",
  "ETH/USDT",
  "SOL/USDT",
  "DOGE/USDT",
  "LINK/USDT",
]
interval_minutes = 240
exchange_id = "binance"
daily_summary_hour = 0    # UTC hour for daily summary (0-23)

[providers]
coinglass_api_key = ""
cryptoquant_api_key = ""
whale_alert_api_key = ""
fred_api_key = ""
coinglass_enabled = true
cryptoquant_enabled = true
whale_alert_enabled = true
fred_enabled = true
defillama_enabled = true
coingecko_enabled = true
sosovalue_api_key = ""
sosovalue_enabled = true
coindesk_api_key = ""
okx_api_key = ""
okx_secret_key = ""
okx_passphrase = ""
okx_enabled = false
binance_audit_enabled = true
binance_sentiment_enabled = true
enforce_token_security = true
max_acceptable_risk = "MEDIUM"
token_tax_threshold = 10

[execution]
# spec 021 H3 ops: 沙箱撮合偶尔延迟到 30-60s 才 fill，30s 太短导致
# 我们误以为单挂掉 + 自动 cancel 失败 + 累积 ghost positions 同 OKX
# 状态发散。提到 120s 兜底沙箱慢撮合，对真实交易所影响很小（成交常 <5s）。
order_wait_seconds = 120
retry_attempts = 3
# graph_timeout_s 600s 留 margin：5-pair 并发 + evaluate_node 慢调用（180-267s
# in prod，与 spec 018 IVE classify_case 串行 LLM 有关）。300s 时观察到大量
# Scheduler timed out 导致 graph 在 evaluate_node 后 cancel，execute/journal
# 节点未触发 → 累计 17 actionable verdicts missed @ 8h live（2026-05-11 诊断）。
graph_timeout_s = 600

[notifications]
webhook_url = ""
enabled = true
webhook_timeout = 5
events = ["trade", "rejection", "circuit_breaker", "reconcile_mismatch", "daily_summary", "portfolio_stale", "price_trigger"]

[notifications.telegram]
bot_token = ""
chat_id = ""
enabled = false

[triggers]
# Event-driven trigger rules (price thresholds, % moves, funding rates,
# candle patterns) — see web frontend at /scheduler. The engine subscribes
# to Binance's public WebSocket ticker stream (no API key needed) and
# fires a full analysis cycle when a rule's condition matches. Defaults to
# enabled so the frontend page works out of the box; rules are off until
# you create them, so an empty rule set is a no-op.
enabled = true
max_rules = 50
ws_reconnect_max_s = 60
funding_rate_poll_interval_minutes = 5

[exchanges.binance]
api_key = ""
secret = ""
sandbox = true

[exchanges.okx]
api_key = ""
secret = ""
passphrase = ""
sandbox = true

[infrastructure]
database_url = ""
redis_url = ""

[chart_analysis]
vision_models = [
    "gpt-4o", "gpt-4o-mini",
    "claude-3-5-sonnet-20241022", "claude-opus-4-5",
    "gemini-3.1-pro", "gemini-3-flash",
]
fast_model = ""
max_image_bytes = 4718592
description_max_tokens = 800

[hitl]
enabled = false
min_position_scale = 0.5
divergence_threshold = 0.6
cold_start_min_trades = 5
approval_timeout_seconds = 300

[hitl.telegram]
enabled = false
bot_token = ""
chat_id = ""

[chat]
# 分析事件缓冲区 TTL（秒），过期后无法重连回放
event_buffer_ttl_seconds = 300
# 最大同时运行的后台分析任务数
max_concurrent_tasks = 10
# Live Steering 单条指令最大字符数
max_steering_instruction_chars = 500
# 事件缓冲区最大条目数（超出时 FIFO 淘汰）
event_buffer_max_size = 500

[mcp]
enabled = false
transport = "stdio"
fallback_on_error = true
call_timeout_s = 5.0

[[mcp.servers]]
name = "cryptotrader-binance"
transport = "stdio"
enabled = true
tools = ["binance_derivatives", "binance_funding_rate", "binance_klines"]

[[mcp.servers]]
name = "cryptotrader-macro"
transport = "stdio"
enabled = true
tools = ["macro_fear_greed", "macro_btc_dominance", "macro_fred_series", "macro_etf_flow"]

[[mcp.servers]]
name = "cryptotrader-onchain"
transport = "stdio"
enabled = true
tools = ["onchain_defi_tvl", "onchain_derivatives", "onchain_exchange_netflow", "onchain_whale_transfers"]

[[mcp.servers]]
name = "cryptotrader-news"
transport = "stdio"
enabled = true
tools = ["news_rss", "news_sosovalue"]

[evolution_daemon]
# spec 022 FR-D4: Evolution reflect daemon configuration
enabled = true
cron = "0 0 * * *"
actions = ["pareto", "regime", "skill_proposal", "pattern_extraction"]
llm_model = ""
propose_threshold = 10
